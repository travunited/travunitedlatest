services:
  postgres:
    image: postgres:16
    container_name: travunited-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: travunited
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: travunited_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: travunited-minio-local
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniolocalpassword
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

